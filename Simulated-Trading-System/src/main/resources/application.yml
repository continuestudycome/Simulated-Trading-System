spring:
    application:
        name: Simulated-Trading-System
    datasource:
        url: jdbc:mysql://localhost:3306/trading?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
        username: root
        password: 123456
        driver-class-name: com.mysql.cj.jdbc.Driver

# mybatis
mybatis:
    configuration:
        map-underscore-to-camel-case: true
        log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 在控制台打印 MyBatis 执行的 SQL 语句
    mapper-locations: classpath*:mapper/*.xml # 告诉 Spring 去哪里找 MyBatis 的 XML 映射文件
