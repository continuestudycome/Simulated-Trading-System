server:
  port: 8080

spring:
  application:
    name: Simulated-Trading-System

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/trading?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}     # 同样必须提供
      database: 0
      timeout: 5000ms
      connect-timeout: 5000ms
      lettuce:
        pool:   # 连接池
          max-active: 10  # 最大连接数
          max-idle: 10    # 最大空闲数（最多可以创建的连接数）
          min-idle: 1     # 最小空闲数（超过一段时间一直没人连接，连接池就会被释放，直到1）
          time-between-eviction-runs: 10s

# mybatis-plus
mybatis-plus:
    configuration:
        map-underscore-to-camel-case: true
        log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    mapper-locations: classpath*:mapper/*.xml

# SpringDoc OpenAPI (Swagger) 配置
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha


